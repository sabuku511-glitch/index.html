<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Googleの所有権確認タグを埋め込みました -->
    <meta name="google-site-verification" content="PX27aKVP0sp9C81JKWT25tq2nBKkue9OsAdR1pFJMHg" />
    <!-- 検索キーワードをタイトルに設定しました -->
    <title>アンテ au game - フリスク無限積み上げパズルゲーム</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            width: 100%;
            height: 100%;
            user-select: none;
            -webkit-user-select: none;
        }
        #game-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: pointer;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 15px 20px;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
        }
        #score-label { color: #ffff00; }
        .frisk {
            position: absolute;
            width: 24px;
            height: 24px;
            pointer-events: none;
            will-change: transform;
        }
        #screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 20;
        }
        .btn {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 24px;
            font-size: 20px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            margin-top: 25px;
        }
        .btn:hover {
            background-color: #ffffff;
            color: #000000;
        }
        h1 { font-size: 36px; margin: 0 0 10px 0; color: #ffffff; }
        p { font-size: 16px; margin: 6px 0; color: #aaaaaa; }
    </style>
</head>
<body>

<div id="ui">
    <div>SCORE</div>
    <div id="score-label">0000</div>
</div>

<div id="game-stage"></div>

<div id="screen-overlay">
    <h1>FRISK STACK</h1>
    <!-- Googleに見つけてもらいやすくするための説明文を追加しました -->
    <p style="color:#ffff00; font-weight:bold;">アンテ au game のファンゲーム！</p>
    <p>画面のすきな場所をクリックしてね</p>
    <p>ぶつかると回ってどこかへ転がっていくよ！</p>
    <button id="start-btn" class="btn">START GAME</button>
</div>

<script>
const stage = document.getElementById('game-stage');
const scoreLabel = document.getElementById('score-label');
const overlay = document.getElementById('screen-overlay');
const startBtn = document.getElementById('start-btn');

let score = 0;
let isPlaying = false;
let blocks = [];
const friskSize = 24;

const friskSvg = `
<svg xmlns="http://w3.org" viewBox="0 0 18 18" width="100%" height="100%">
  <path d="M0,0 h18 v6 h-18 z M0,6 h3 v5 h-3 z M15,6 h3 v5 h-3 z M6,6 h2 v2 h-2 z" fill="#513312"/>
  <path d="M3,6 h12 v7 h-12 z" fill="#e5b28d"/>
  <path d="M5,9 h2 v1 h-2 z M11,9 h2 v1 h-2 z" fill="#000000"/>
  <path d="M8,11 h3 v1 h-3 z" fill="#000000"/>
  <path d="M1,13 h16 v5 h-16 z" fill="#2445cc"/>
  <path d="M1,14 h16 v1 h-16 z M2,17 h14 v1 h-16 z" fill="#cc3bc2"/>
</svg>
`;

startBtn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    overlay.style.display = 'none';
    score = 0;
    scoreLabel.innerText = "0000";
    stage.innerHTML = '';
    blocks = [];
    isPlaying = true;
});

function dropFrisk(clickX) {
    if (!isPlaying) return;

    score++;
    scoreLabel.innerText = String(score).padStart(4, '0');

    const el = document.createElement('div');
    el.className = 'frisk';
    el.innerHTML = friskSvg;
    stage.appendChild(el);

    const block = {
        element: el,
        x: clickX - friskSize / 2,
        y: -30,
        vx: (Math.random() - 0.5) * 4,
        vy: 2,
        angle: (Math.random() - 0.5) * 45,
        va: (Math.random() - 0.5) * 10,
        isStatic: false
    };
    blocks.push(block);
}

stage.addEventListener('mousedown', (e) => {
    dropFrisk(e.clientX);
});

stage.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if(e.touches.length > 0) {
        dropFrisk(e.touches.clientX);
    }
}, { passive: false });

function update() {
    const floorY = window.innerHeight - friskSize;

    for (let i = 0; i < blocks.length; i++) {
        let b = blocks[i];
        if (b.isStatic) continue;

        b.vy += 0.4;
        b.x += b.vx;
        b.y += b.vy;
        b.angle += b.va;

        if (b.y >= floorY) {
            b.y = floorY;
            b.vy = -b.vy * 0.2;
            b.vx *= 0.8;
            b.va *= 0.5;
            
            if (Math.abs(b.vy) < 0.5 && Math.abs(b.vx) < 0.5) {
                b.isStatic = true;
                b.vy = 0;
                b.vx = 0;
                b.va = 0;
            }
        }

        for (let j = 0; j < blocks.length; j++) {
            let other = blocks[j];
            if (b === other || !other.isStatic) continue;

            if (b.x < other.x + friskSize && b.x + friskSize > other.x &&
                b.y + friskSize >= other.y && b.y < other.y + friskSize) {
                
                let dir = b.x < other.x ? -1 : 1;
                b.vx = dir * (Math.random() * 3 + 2);
                b.vy = -2;
                b.va = dir * (Math.random() * 15 + 10);
                b.y = other.y - friskSize;
            }
        }

        b.element.style.transform = `translate(${b.x}px, ${b.y}px) rotate(${b.angle}deg)`;
    }

    requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
