<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>アンテ au game - フリスク無限積み上げパズルゲーム</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            width: 100%;
            height: 100%;
            user-select: none;
            -webkit-user-select: none;
        }
        /* ゲーム画面全体をタップ可能に */
        #game-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            cursor: pointer;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 15px 20px;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
        }
        #score-label { color: #ffff00; }
        
        /* フリスク（ドット絵キャラクター）の見た目 */
        .frisk {
            position: absolute;
            width: 24px;
            height: 24px;
            pointer-events: none;
            will-change: transform;
        }
        
        /* タイトル画面（最前面） */
        #screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 20;
        }
        .btn {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
            padding: 12px 24px;
            font-size: 20px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            margin-top: 25px;
        }
        .btn:hover {
            background-color: #ffffff;
            color: #000000;
        }
        h1 { font-size: 36px; margin: 0 0 10px 0; color: #ffffff; }
        p { font-size: 16px; margin: 6px 0; color: #aaaaaa; }
    </style>
</head>
<body>

<div id="ui">
    <div>SCORE</div>
    <div id="score-label">0000</div>
</div>

<!-- ここをクリックするとフリスクが落ちます -->
<div id="game-stage"></div>

<div id="screen-overlay">
    <h1 id="title-text">FRISK STACK</h1>
    <p>画面のすきな場所をクリックしてね</p>
    <p>ぶつかると回ってどこかへ転がっていくよ！</p>
    <button id="start-btn" class="btn">START GAME</button>
</div>

<script>
const stage = document.getElementById('game-stage');
const scoreLabel = document.getElementById('score-label');
const overlay = document.getElementById('screen-overlay');
const startBtn = document.getElementById('start-btn');

let score = 0;
let isPlaying = false;
let blocks = [];
const friskSize = 24; // ちょびっと小さいサイズ

// SVGでフリスクのドット絵を生成するデータ
const friskSvg = `
<svg xmlns="http://w3.org" viewBox="0 0 18 18" width="100%" height="100%">
  <!-- 髪の毛 -->
  <path d="M0,0 h18 v6 h-18 z M0,6 h3 v5 h-3 z M15,6 h3 v5 h-3 z M6,6 h2 v2 h-2 z" fill="#513312"/>
  <!-- お肌 -->
  <path d="M3,6 h12 v7 h-12 z" fill="#e5b28d"/>
  <!-- 目 -->
  <path d="M5,9 h2 v1 h-2 z M11,9 h2 v1 h-2 z" fill="#000000"/>
  <!-- 口 -->
  <path d="M8,11 h3 v1 h-3 z" fill="#000000"/>
  <!-- 服のベース（青） -->
  <path d="M1,13 h16 v5 h-16 z" fill="#2445cc"/>
  <!-- 紫のボーダーライン -->
  <path d="M1,14 h16 v1 h-16 z M2,17 h14 v1 h-16 z" fill="#cc3bc2"/>
</svg>
`;

// スタートボタンを最優先で動かす
startBtn.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    overlay.style.display = 'none';
    score = 0;
    scoreLabel.innerText = "0000";
    stage.innerHTML = '';
    blocks = [];
    isPlaying = true;
});

// フリスクを落とすメイン処理
function dropFrisk(clickX) {
    if (!isPlaying) return;

    score++;
    scoreLabel.innerText = String(score).padStart(4, '0');

    // フリスクの要素を作成
    const el = document.createElement('div');
    el.className = 'frisk';
    el.innerHTML = friskSvg;
    stage.appendChild(el);

    // 物理パラメータの設定
    const block = {
        element: el,
        x: clickX - friskSize / 2,
        y: -30,
        vx: (Math.random() - 0.5) * 4, // 左右の散らばり
        vy: 2,                        // 初速
        angle: (Math.random() - 0.5) * 45, // 初期の傾き
        va: (Math.random() - 0.5) * 10,   // 回転速度
        isStatic: false
    };
    blocks.push(block);
}

// パソコンのクリックイベント
stage.addEventListener('mousedown', (e) => {
    dropFrisk(e.clientX);
});

// スマホ・タブレットのタップイベント
stage.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if(e.touches.length > 0) {
        dropFrisk(e.touches[0].clientX);
    }
}, { passive: false });

// アニメーションループ（物理演算）
function update() {
    const floorY = window.innerHeight - friskSize;

    for (let i = 0; i < blocks.length; i++) {
        let b = blocks[i];
        if (b.isStatic) continue;

        // 重力と移動
        b.vy += 0.4; // 重力
        b.x += b.vx;
        b.y += b.vy;
        b.angle += b.va; // くるくる回る

        // 画面の底（床）に当たったとき
        if (b.y >= floorY) {
            b.y = floorY;
            b.vy = -b.vy * 0.2; // 少し跳ねる
            b.vx *= 0.8;
            b.va *= 0.5;
            
            if (Math.abs(b.vy) < 0.5 && Math.abs(b.vx) < 0.5) {
                b.isStatic = true;
                b.vy = 0;
                b.vx = 0;
                b.va = 0;
            }
        }

        // 他の積んであるフリスクとの当たり判定
        for (let j = 0; j < blocks.length; j++) {
            let other = blocks[j];
            if (b === other || !other.isStatic) continue;

            // 四角形のぶつかり合い判定
            if (b.x < other.x + friskSize && b.x + friskSize > other.x &&
                b.y + friskSize >= other.y && b.y < other.y + friskSize) {
                
                // 当たったらお互いの位置に応じて外側へ「回って吹っ飛ぶ」
                let dir = b.x < other.x ? -1 : 1;
                b.vx = dir * (Math.random() * 3 + 2); // 横に弾け飛ぶ
                b.vy = -2; // ちょこんと上に弾む
                b.va = dir * (Math.random() * 15 + 10); // 激しく回転する
                b.y = other.y - friskSize;
            }
        }

        // 画面に位置と回転を反映
        b.element.style.transform = `translate(${b.x}px, ${b.y}px) rotate(${b.angle}deg)`;
    }

    requestAnimationFrame(update);
}

// ループ始動
update();
</script>

</body>
</html>
